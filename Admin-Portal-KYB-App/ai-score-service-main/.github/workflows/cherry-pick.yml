name: Cherry Pick to Release Branches

on:
  pull_request:
    types:
      - labeled
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR Number to Cherry Pick"
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  extract-label:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && github.event.action == 'labeled' && (contains(github.event.label.name, 'cherry-pick to release/') || contains(github.event.label.name, 'cherry-pick to current release')) && github.event.pull_request.merged == true) ||
      (github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true)
    outputs:
      pr_number: ${{ steps.set-pr-number.outputs.pr_number }}
      cherry_pick_labels: ${{ steps.extract-labels.outputs.cherry_pick_labels }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}

      - name: Set PR Number
        id: set-pr-number
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            PR_NUMBER="${{ github.event.inputs.pr_number }}"
          else
            PR_NUMBER="${{ github.event.pull_request.number }}"
          fi
          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
          echo "📋 Processing PR #$PR_NUMBER"

      - name: Extract Cherry-Pick Labels
        id: extract-labels
        env:
          GH_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        run: |
          PR_NUMBER="${{ steps.set-pr-number.outputs.pr_number }}"
          
          # Get cherry-pick labels based on trigger type
          CHERRY_PICK_LABELS=""
          if [[ "${{ github.event.action }}" == "labeled" ]]; then
            LABEL="${{ github.event.label.name }}"
            if [[ "$LABEL" == *"cherry-pick to release/"* ]] || [[ "$LABEL" == *"cherry-pick to current release"* ]]; then
              CHERRY_PICK_LABELS="$LABEL"
            fi
          elif [[ "${{ github.event.action }}" == "closed" ]] || [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            LABELS=$(gh pr view $PR_NUMBER --json labels --jq '[.labels[].name | select(startswith("cherry-pick to release/") or contains("cherry-pick to current release"))] | join("\n")')
            CHERRY_PICK_LABELS="$LABELS"
          fi
          
          if [[ -z "$CHERRY_PICK_LABELS" ]]; then
            echo "⚠️ No cherry-pick labels found"
            echo "cherry_pick_labels=[]" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          echo "🏷️ Found cherry-pick labels:"
          echo "$CHERRY_PICK_LABELS"
          
          # Convert labels to JSON array
          LABELS_JSON=$(echo "$CHERRY_PICK_LABELS" | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "cherry_pick_labels=$LABELS_JSON" >> $GITHUB_OUTPUT
          echo "Generated labels JSON: $LABELS_JSON"

  cherry-pick-to-branches:    
    needs: extract-label
    if: needs.extract-label.outputs.cherry_pick_labels != '[]'
    strategy:
      matrix:
        label: ${{ fromJson(needs.extract-label.outputs.cherry_pick_labels) }}
      fail-fast: false
    runs-on: ubuntu-latest  
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}

      - name: Set up Python for Calendar Fetch
        if: contains(matrix.label, 'cherry-pick to current release') || (!contains(matrix.label, 'cherry-pick to current release') && !contains(matrix.label, 'exception'))
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Python dependencies
        if: contains(matrix.label, 'cherry-pick to current release') || (!contains(matrix.label, 'cherry-pick to current release') && !contains(matrix.label, 'exception'))
        run: |
          pip install google-auth google-api-python-client requests google-auth-httplib2 google-auth-oauthlib packaging

      - name: Check Google Calendar for Current Release Train
        if: contains(matrix.label, 'cherry-pick to current release') || (!contains(matrix.label, 'cherry-pick to current release') && !contains(matrix.label, 'exception'))
        id: calendar-fetch
        env:
          CALENDAR_ID: ${{ secrets.SPRINT_AND_RELEASE_CALENDAR_ID }}
          SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_CREDENTIALS_JSON }}
        run: |
          echo "$SERVICE_ACCOUNT_JSON" > service-account.json

          echo "Running calendar check script..."
          PY_OUTPUT=$(python .github/scripts/calendar_fetch.py | tee /dev/stderr)

          echo "Full Python output:"
          echo "$PY_OUTPUT"

          # Extract and process release trains in one pass
          RELEASE_TRAINS=$(echo "$PY_OUTPUT" | grep -oE "release/v[0-9]+\.[0-9]+\.[0-9]+[^[:space:]]*" | \
            while IFS= read -r line; do
              if [[ $line =~ ^release/v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
                # Standard release - output as-is
                echo "$line"
              elif [[ $line =~ ^release/v[0-9]+\.[0-9]+\.[0-9]+-.+-v([0-9]+)$ ]]; then
                # Special release ending with -vX - extract vX
                echo "v${BASH_REMATCH[1]}"
              fi
            done | sort -u)

          echo "release_trains<<EOF" >> $GITHUB_OUTPUT
          echo "$RELEASE_TRAINS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          echo "Extracted release trains:"
          echo "$RELEASE_TRAINS"

      - name: Parse Label Information
        id: parse-label
        run: |
          LABEL="${{ matrix.label }}"
          echo "Processing label: '$LABEL'"
          
          # Check for label-specific exception
          HAS_EXCEPTION="false"
          if [[ "$LABEL" == *"exception"* ]]; then
            HAS_EXCEPTION="true"
          fi
          
          # Determine cherry-pick type
          if [[ "$LABEL" == *" as hotfix"* ]]; then
            TYPE="HOTFIX"
          elif [[ "$LABEL" == *" as fast"* ]]; then
            TYPE="FAST"
          else
            TYPE="REGULAR"
          fi
          
          # Handle "cherry-pick to current release" label
          if [[ "$LABEL" == *"cherry-pick to current release"* ]]; then
            RELEASE_TRAINS="${{ steps.calendar-fetch.outputs.release_trains }}"
            if [[ -z "$RELEASE_TRAINS" ]]; then
              echo "❌ Could not determine release trains from calendar"
              exit 1
            fi
            
            # Extract standard releases (release/vX.Y.Z pattern) and get the biggest one
            CURRENT_RELEASE=$(echo "$RELEASE_TRAINS" | grep -E "^release/v[0-9]+\.[0-9]+\.[0-9]+$" | \
              sort -V | tail -1)
            
            if [[ -z "$CURRENT_RELEASE" ]]; then
              echo "❌ No standard release trains found"
              exit 1
            fi
            
            BRANCH="$CURRENT_RELEASE"
            echo "Selected current release: $CURRENT_RELEASE"
          else
            # Extract branch from existing label format
            BRANCH=$(echo "$LABEL" | sed -E 's/cherry-pick to (release\/[^ ]+).*/\1/')
          fi
          
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          echo "has_exception=$HAS_EXCEPTION" >> $GITHUB_OUTPUT
          echo "type=$TYPE" >> $GITHUB_OUTPUT
          echo "label=$LABEL" >> $GITHUB_OUTPUT
          
          echo "  Branch: $BRANCH"
          echo "  Type: $TYPE"
          echo "  Has exception: $HAS_EXCEPTION"

      - name: Release Rules Validation
        id: release-rules-validation
        if: steps.parse-label.outputs.has_exception != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ needs.extract-label.outputs.pr_number }}
          TARGET_BRANCH: ${{ steps.parse-label.outputs.branch }}
          LABEL_TEXT: ${{ steps.parse-label.outputs.label }}
          RELEASE_TRAINS: ${{ steps.calendar-fetch.outputs.release_trains }}
        run: |
          python .github/scripts/release_rules_validation.py
      
      - name: Validate Branch Existence
        id: validate-branch
        env:
          GH_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        run: |
          BRANCH="${{ steps.parse-label.outputs.branch }}"
          PR_NUMBER="${{ needs.extract-label.outputs.pr_number }}"
          
          echo "🔍 Checking if branch exists: $BRANCH"
          
          # Check if branch exists
          if [[ "$BRANCH" =~ ^release/ ]]; then
            if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
              echo "✅ Branch exists and is valid"
              echo "branch_valid=true" >> $GITHUB_OUTPUT
            else
              echo "❌ Branch does not exist"
              echo "branch_valid=false" >> $GITHUB_OUTPUT
              gh pr comment $PR_NUMBER --body "## ⚠️ Cherry-Pick Validation Warning
              Branch \`$BRANCH\` does not exist in the repository. Please verify the branch name in your label: \`${{ steps.parse-label.outputs.label }}\`"
              exit 1
            fi
          else
            echo "❌ Invalid branch format"
            echo "branch_valid=false" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Determine Merge Commit
        id: get-merge-commit
        if: steps.validate-branch.outputs.branch_valid == 'true'
        env:
          GH_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        run: |
          PR_NUMBER="${{ needs.extract-label.outputs.pr_number }}"
          PR_INFO=$(gh pr view $PR_NUMBER --json mergeCommit)
          MERGE_COMMIT=$(echo "$PR_INFO" | jq -r '.mergeCommit.oid')
          if [[ -z "$MERGE_COMMIT" || "$MERGE_COMMIT" == "null" ]]; then
            echo "No merge commit found. Ensure the PR is merged."
            exit 1
          fi
          echo "merge_commit=$MERGE_COMMIT" >> $GITHUB_OUTPUT

      - name: Add Cherry-Pick In Progress Comment
        if: steps.validate-branch.outputs.branch_valid == 'true'
        env:
          GH_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        run: |
          PR_NUMBER="${{ needs.extract-label.outputs.pr_number }}"
          SHORT_COMMIT=$(echo "${{ steps.get-merge-commit.outputs.merge_commit }}" | cut -c1-7)
          RELEASE_BRANCH="${{ steps.parse-label.outputs.branch }}"
          LABEL_TEXT="${{ steps.parse-label.outputs.label }}"

          COMMENT="## 🚀 Cherry-Pick In Progress
          Commit [\`$SHORT_COMMIT\`](https://github.com/${{ github.repository }}/commit/${{ steps.get-merge-commit.outputs.merge_commit }}) is currently being cherry-picked to the following branch:
          [\`$RELEASE_BRANCH\`](https://github.com/${{ github.repository }}/tree/$RELEASE_BRANCH).
          
          **Label:** \`$LABEL_TEXT\`"

          gh pr comment "$PR_NUMBER" --body "$COMMENT"

      - name: Perform Cherry Pick
        id: cherry-pick
        if: steps.validate-branch.outputs.branch_valid == 'true'
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "GitHub Actions"

          echo "${{ secrets.PERSONAL_ACCESS_TOKEN }}" > token.txt
          gh auth login --with-token < token.txt

          RELEASE_BRANCH="${{ steps.parse-label.outputs.branch }}"
          MERGE_COMMIT="${{ steps.get-merge-commit.outputs.merge_commit }}"
          SHORT_COMMIT=$(echo $MERGE_COMMIT | cut -c1-7)
          PR_NUMBER="${{ needs.extract-label.outputs.pr_number }}"
          PR_TITLE=$(gh pr view $PR_NUMBER --json title --jq '.title')
          CHERRY_PICK_TYPE="${{ steps.parse-label.outputs.type }}"

          CHERRY_PICK_BRANCH="cherry_pick_release_$(echo $RELEASE_BRANCH | tr '/' '_')_${MERGE_COMMIT:0:7}"

          # Try to cherry-pick
          if git checkout $RELEASE_BRANCH && git checkout -b $CHERRY_PICK_BRANCH; then
            if git cherry-pick -x -m 1 "$MERGE_COMMIT"; then
              git push -u origin $CHERRY_PICK_BRANCH

              CHERRY_PICK_PR=$(gh pr create \
                --base "$RELEASE_BRANCH" \
                --head "$CHERRY_PICK_BRANCH" \
                --title "$PR_TITLE [Cherry-pick to $RELEASE_BRANCH] #$CHERRY_PICK_TYPE (Original PR: #$PR_NUMBER)" \
                --body "This is an automated pull request to cherry-pick [\`$SHORT_COMMIT\`](https://github.com/${{ github.repository }}/commit/$MERGE_COMMIT) to [\`$RELEASE_BRANCH\`](https://github.com/${{ github.repository }}/tree/$RELEASE_BRANCH).
                
                Original PR: #$PR_NUMBER")

              echo "cherry_pick_pr=$CHERRY_PICK_PR" >> $GITHUB_OUTPUT
              echo "cherry_pick_status=success" >> $GITHUB_OUTPUT
            else
                git cherry-pick --abort
                git commit --allow-empty -m "Cherry-pick failed for $SHORT_COMMIT. Needs manual resolution."
                git push -u origin $CHERRY_PICK_BRANCH
            
                CHERRY_PICK_PR=$(gh pr create \
                --base "$RELEASE_BRANCH" \
                --head "$CHERRY_PICK_BRANCH" \
                --title "$PR_TITLE [Cherry-pick to $RELEASE_BRANCH] #$CHERRY_PICK_TYPE (Original PR: #$PR_NUMBER)" \
                --body "This is an automated pull request to cherry-pick [\`$SHORT_COMMIT\`](https://github.com/${{ github.repository }}/commit/$MERGE_COMMIT) to [\`$RELEASE_BRANCH\`](https://github.com/${{ github.repository }}/tree/$RELEASE_BRANCH).
                
                Original PR: #$PR_NUMBER")

                echo "cherry_pick_pr=$CHERRY_PICK_PR" >> $GITHUB_OUTPUT
                echo "cherry_pick_status=failed" >> $GITHUB_OUTPUT
            
                COMMENT="## ❌ Cherry-pick Failed
                Cherry-pick to $RELEASE_BRANCH failed for label: \`${{ steps.parse-label.outputs.label }}\`
                
                Branch created for cherry-pick: $CHERRY_PICK_BRANCH.
                PR created for cherry-pick: $CHERRY_PICK_PR 
                
                ### ⚠️ Manual Resolution Required
                The cherry-pick failed due to conflicts. Please follow the steps below to resolve them manually:
                
                1. git checkout $CHERRY_PICK_BRANCH
                2. git cherry-pick -x -m 1 $MERGE_COMMIT
                3. git status
                4. Resolve conflicts in the conflicting files (files with conflict markers).
                5. git add <resolved_files>
                6. git cherry-pick --continue
                7. git push origin $CHERRY_PICK_BRANCH
                8. Open a pull request to merge the branch into $RELEASE_BRANCH."
            
                gh pr comment "$PR_NUMBER" --body "$COMMENT"
            fi
          fi

      - name: Add cherry-pick-release label
        if: steps.cherry-pick.outputs.cherry_pick_pr != ''
        run: |
          PR_NUMBER=${{ steps.cherry-pick.outputs.cherry_pick_pr }}
          PR_NUMBER=$(echo "$PR_NUMBER" | grep -o '[0-9]\+$')

          echo "Adding label to PR #$PR_NUMBER"
          gh label create "cherry-pick-release" \
            --description "Cherry-picked changes to release branch" \
            --color "0052cc" || true
            
          gh pr edit "$PR_NUMBER" --add-label "cherry-pick-release"
        env:
          GITHUB_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}

      - name: Fail job if cherry-pick failed
        if: steps.cherry-pick.outputs.cherry_pick_status == 'failed'
        run: exit 1

      - name: Add Completion Comment
        if: steps.cherry-pick.outputs.cherry_pick_status == 'success'
        env:
          GH_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        run: |
          PR_NUMBER="${{ needs.extract-label.outputs.pr_number }}"
          RELEASE_BRANCH="${{ steps.parse-label.outputs.branch }}"
          SHORT_COMMIT=$(echo "${{ steps.get-merge-commit.outputs.merge_commit }}" | cut -c1-7)
          CHERRY_PICK_PR="${{ steps.cherry-pick.outputs.cherry_pick_pr }}"
          LABEL_TEXT="${{ steps.parse-label.outputs.label }}"
          
          gh pr comment $PR_NUMBER --body "## ✅ Cherry-pick Pull Request Created 
          Cherry-pick bot created pull request for commit [\`$SHORT_COMMIT\`](https://github.com/${{ github.repository }}/commit/${{ steps.get-merge-commit.outputs.merge_commit }}):
          
          | Branch | Label | PR Link |
          |--------|-------|---------|
          | $RELEASE_BRANCH | \`$LABEL_TEXT\` | [View PR]($CHERRY_PICK_PR) |"

      - name: Determine PR Owner and Labeler
        id: pr-details
        if: steps.cherry-pick.outputs.cherry_pick_status == 'success'
        env:
          GH_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        run: |
          PR_NUMBER="${{ needs.extract-label.outputs.pr_number }}"
          PR_OWNER=$(gh pr view $PR_NUMBER --json author --jq '.author.login')
          LABELER=$(gh api repos/${{ github.repository }}/issues/$PR_NUMBER/events | jq -r '[.[] | select(.event=="labeled")] | last | .actor.login')
          echo "PR Owner: $PR_OWNER"
          echo "Labeler: $LABELER"
          echo "pr_owner=$PR_OWNER" >> $GITHUB_ENV
          echo "labeler=$LABELER" >> $GITHUB_ENV

      - name: Auto Approve & Merge Cherry-Pick PRs (if same user)
        if: env.pr_owner == env.labeler
        run: |
          PR_NUMBER=${{ steps.cherry-pick.outputs.cherry_pick_pr }}

          echo "${{ secrets.PERSONAL_ACCESS_TOKEN_AUTOAPPROVEBOT }}" > token.txt
          gh auth login --with-token < token.txt

          gh pr review --approve "$PR_NUMBER"

          echo "🕐 Waiting for status checks to complete (timeout: 10 minutes)..."
          if timeout 10m gh pr checks "$PR_NUMBER" --watch; then
            echo "✅ All required status checks passed successfully."
            echo "🚀 Proceeding with squash merge for PR #$PR_NUMBER..."
            gh pr merge --squash "$PR_NUMBER"

            ORGINAL_PR_NUMBER=${{ needs.extract-label.outputs.pr_number }}
            SHORT_COMMIT=$(echo "${{ steps.get-merge-commit.outputs.merge_commit }}" | cut -c1-7)
            RELEASE_BRANCH="${{ steps.parse-label.outputs.branch }}"

            if [ "$(gh pr view "$PR_NUMBER" --json mergedAt --jq '.mergedAt')" != "null" ]; then
              COMMENT="## ✅ Cherry-pick completed successfully!
            Commit [\`$SHORT_COMMIT\`](https://github.com/${{ github.repository }}/commit/${{ steps.get-merge-commit.outputs.merge_commit }}) has been cherry-picked to the [\`$RELEASE_BRANCH\`](https://github.com/${{ github.repository }}/tree/$RELEASE_BRANCH)."
              gh pr comment "$ORGINAL_PR_NUMBER" --body "$COMMENT"
            else
              FAILED_COMMENT="## ❌ Cherry-pick PR Merge Failed!
            The cherry-pick PR $PR_NUMBER was not merged successfully.  
            Please check the PR status and resolve any conflicts before retrying."         
              gh pr comment "$ORGINAL_PR_NUMBER"  --body "$FAILED_COMMENT"
            fi
          else
            echo "❌ Status checks failed or did not complete within the 10-minute timeout."
            echo "🛑 Skipping merge. Please review the failing checks before retrying."
            FAILED_COMMENT="## ❌ Cherry-pick PR Merge Failed!
          The cherry-pick PR $PR_NUMBER was not merged successfully.  
          Please check the PR status and resolve any conflicts before retrying."         
            gh pr comment "$ORGINAL_PR_NUMBER"  --body "$FAILED_COMMENT"
          fi

      - name: Assign Original PR Owner as Reviewer (if different user labeled)
        if: env.pr_owner != env.labeler
        env:
          GH_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        run: |
          PR_NUMBER=${{ steps.cherry-pick.outputs.cherry_pick_pr }}
          gh pr edit $PR_NUMBER --add-reviewer "$pr_owner"
          ORGINAL_PR_NUMBER=${{ needs.extract-label.outputs.pr_number }}
          COMMENT="## 🔍 Reviewer Assigned
          The original PR owner **@${{ env.pr_owner }}** has been assigned as a reviewer for the cherry-pick PR $PR_NUMBER to ensure correctness."
          gh pr comment "$ORGINAL_PR_NUMBER" --body "$COMMENT"
