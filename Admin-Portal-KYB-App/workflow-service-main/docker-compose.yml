services:
  workflow-service:
    build:
      context: .
      dockerfile: Dockerfile.local
      args:
        NPM_TOKEN: ${NPM_TOKEN}
    ports:
      - 3007:3007
    environment:
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=200
      - DOPPLER_TOKEN=${DOPPLER_TOKEN}
      - DOPPLER_PROJECT=workflow-service
      - DOPPLER_CONFIG=local
    volumes:
      - .:/app
      - workflow_node_modules:/app/node_modules
    networks:
      - server-network

volumes:
  workflow_node_modules:

networks:
  server-network:
    external: true
