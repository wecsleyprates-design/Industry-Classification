name: Microsite Health Verification

on:
  pull_request:
    branches: 
      - "main"
      - "release/*"
    
permissions:
  id-token: write
  contents: read
  
jobs:
  detect-changes:
    name: Detect Changed Microsites
    runs-on: ubuntu-latest
    outputs:
      microsites: ${{ steps.detect.outputs.microsites }}
      has-changes: ${{ steps.detect.outputs.has-changes }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Detect changed microsites
        id: detect
        run: |
          # Get the list of changed files
          if [ "${{ github.event.pull_request.base.sha }}" != "" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
          else
            BASE_SHA="origin/${{ github.base_ref }}"
          fi
          
          # Get changed files in packages directory
          CHANGED_FILES=$(git diff --name-only $BASE_SHA HEAD | grep '^packages/' || true)
          
          if [ -z "$CHANGED_FILES" ]; then
            echo "No changes detected in packages directory"
            echo "has-changes=false" >> $GITHUB_OUTPUT
            echo "microsites=[]" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # Extract unique microsite names from changed paths
          MICROSITES=$(echo "$CHANGED_FILES" | \
            grep '^packages/' | \
            cut -d'/' -f2 | \
            sort -u | \
            jq -R -s -c 'split("\n") | map(select(length > 0))')
          
          echo "Detected microsites with changes: $MICROSITES"
          echo "has-changes=true" >> $GITHUB_OUTPUT
          echo "microsites=$MICROSITES" >> $GITHUB_OUTPUT

  verify:
    name: Verify ${{ matrix.microsite }}
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.has-changes == 'true'
    strategy:
      fail-fast: false
      matrix:
        microsite: ${{ fromJson(needs.detect-changes.outputs.microsites) }}
    
    env:
      DOPPLER_PROJECT: microsites-${{ matrix.microsite }}
      DOPPLER_CONFIG: development
      WORKING_DIR: packages/${{ matrix.microsite }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          
      - name: Get OIDC token
        id: get_token
        run: |
          TOKEN=$(curl -s -H "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
                       "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=https://github.com/$GITHUB_REPOSITORY_OWNER")
          echo "OIDC_TOKEN=$(echo $TOKEN | jq -r '.value')" >> $GITHUB_ENV
          
      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v3
        
      - name: Login with OIDC token
        run: doppler oidc login --scope=. --identity=${{ secrets.DOPPLER_ALL_PROJECTS_OIDC_ID }} --token=$OIDC_TOKEN
        
      - name: Fetch Environment Variables from Doppler
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          doppler run -p "$DOPPLER_PROJECT" -c "$DOPPLER_CONFIG" -- env > .env
                  
      - name: Install dependencies
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          echo "@joinworth:registry=https://npm.pkg.github.com" > .npmrc
          echo "//npm.pkg.github.com/:_authToken=${{secrets.PERSONAL_ACCESS_TOKEN_READ_PACKAGE}}" >> .npmrc
          npm ci --ignore-scripts
          
      - name: Determine Port
        id: port
        working-directory: ${{ env.WORKING_DIR }}
        run: |          
          # Use VITE_PORT from Doppler if set, otherwise use default ports
          if [ -n "$VITE_PORT" ]; then
            PORT=$VITE_PORT
          else
            case "${{ matrix.microsite }}" in
              dashboard)
                PORT=5176
                ;;
              case)
                PORT=5177
                ;;
              user)
                PORT=5178
                ;;
              customer)
                PORT=5179
                ;;
              *)
                PORT=5173
                ;;
            esac
          fi
          
          echo "PORT=$PORT" >> $GITHUB_OUTPUT
          echo "Using port $PORT for ${{ matrix.microsite }}"

      - name: Build
        working-directory: ${{ env.WORKING_DIR }}
        run: npm run build
