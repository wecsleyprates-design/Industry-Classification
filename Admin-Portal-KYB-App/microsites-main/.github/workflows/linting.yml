name: Linting

on:
  push:
    branches: 
      - "main"
  pull_request:
    branches: 
      - "main"
    
permissions:
  contents: write
  
jobs:
  detect-changes:
    name: Detect Changed Microsites
    runs-on: ubuntu-latest
    outputs:
      microsites: ${{ steps.detect.outputs.microsites }}
      has-changes: ${{ steps.detect.outputs.has-changes }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Detect changed microsites
        id: detect
        run: |
          # Get the list of changed files
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
          else
            # For push events, compare with previous commit
            BASE_SHA="${{ github.event.before }}"
          fi
          
          # Get changed files in packages directory
          CHANGED_FILES=$(git diff --name-only $BASE_SHA HEAD | grep '^packages/' || true)
          
          if [ -z "$CHANGED_FILES" ]; then
            echo "No changes detected in packages directory"
            echo "has-changes=false" >> $GITHUB_OUTPUT
            echo "microsites=[]" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # Extract unique microsite names from changed paths
          MICROSITES=$(echo "$CHANGED_FILES" | \
            grep '^packages/' | \
            cut -d'/' -f2 | \
            sort -u | \
            jq -R -s -c 'split("\n") | map(select(length > 0))')
          
          echo "Detected microsites with changes: $MICROSITES"
          echo "has-changes=true" >> $GITHUB_OUTPUT
          echo "microsites=$MICROSITES" >> $GITHUB_OUTPUT

  lint:
    name: Lint ${{ matrix.microsite }}
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.has-changes == 'true'
    strategy:
      fail-fast: false
      matrix:
        microsite: ${{ fromJson(needs.detect-changes.outputs.microsites) }}
        node-version: [24.x]
    
    env:
      WORKING_DIR: packages/${{ matrix.microsite }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          
      - name: Install dependencies
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          echo "//npm.pkg.github.com/:_authToken=${{secrets.PERSONAL_ACCESS_TOKEN_READ_PACKAGE}}" > .npmrc
          npm ci --ignore-scripts
          
      - name: Run Formatter
        working-directory: ${{ env.WORKING_DIR }}
        env:
          NODE_OPTIONS: "--max_old_space_size=4096"
        run: npm run format
        
      - name: Commit Formatting Changes
        if: github.event_name == 'pull_request'
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git restore --staged .npmrc
          git restore .npmrc
          if [ -z "$(git status --porcelain)" ]; then
            echo "No formatting changes to commit for ${{ matrix.microsite }}"
          else
            git commit -m "chore: auto-format code for ${{ matrix.microsite }}"
            git pull --rebase origin ${{ github.head_ref }}
            git push origin HEAD:${{ github.head_ref }}
          fi
          
      - name: Run Lint
        working-directory: ${{ env.WORKING_DIR }}
        env:
          NODE_OPTIONS: "--max_old_space_size=4096"
        run: npm run lint
