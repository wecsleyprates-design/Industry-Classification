name: Version, Release & Deploy to Dev

run-name: "Release & Deploy: ${{ github.event.head_commit.message }}"

# This workflow automatically runs when code is merged to main:
# 1. Extracts the version label (major/minor/patch) from the merged PR
# 2. Creates a new version release and tag based on semantic versioning
# 3. Detects which microsites changed and deploys only those to dev/qa

on:
  push:
    branches:
      - main
    paths:
      - 'packages/**'

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  get-version-type:
    name: Get Version Type from Merged PR
    runs-on: ubuntu-latest
    outputs:
      version_type: ${{ steps.version.outputs.version_type }}
      pr_number: ${{ steps.version.outputs.pr_number }}
      
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Get merged PR labels
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUMBER=$(gh pr list \
            --search "${{ github.sha }}" \
            --state merged \
            --json number \
            --jq '.[0].number')
          
          if [ -z "$PR_NUMBER" ]; then
            SHA="${{ github.sha }}"
            PR_NUMBER=$(gh pr list \
              --state merged \
              --limit 5 \
              --json number,mergeCommit \
              --jq ".[] | select(.mergeCommit.oid == \"$SHA\" or .mergeCommit.oid == \"\") | .number" | head -1)
          fi
          
          if [ -z "$PR_NUMBER" ] || [ "$PR_NUMBER" == "null" ]; then
            echo "❌ Could not find merged PR for commit ${{ github.sha }}"
            exit 1
          fi
          
          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
          echo "Found merged PR #$PR_NUMBER"
          
          LABELS=$(gh pr view $PR_NUMBER --json labels --jq '.labels[].name')
          echo "PR Labels: $LABELS"
          
          if echo "$LABELS" | grep -q "major"; then
            echo "version_type=major" >> $GITHUB_OUTPUT
            echo "🚀 Version bump: MAJOR"
          elif echo "$LABELS" | grep -q "minor"; then
            echo "version_type=minor" >> $GITHUB_OUTPUT
            echo "✨ Version bump: MINOR"
          elif echo "$LABELS" | grep -q "patch"; then
            echo "version_type=patch" >> $GITHUB_OUTPUT
            echo "🐛 Version bump: PATCH"
          else
            echo "❌ No version label found (major/minor/patch)"
            exit 1
          fi

  create-release:
    name: Create New Version Release
    runs-on: ubuntu-latest
    needs: get-version-type
    outputs:
      new_tag: ${{ steps.bump.outputs.new_tag }}
      
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Bump version and create release
        id: bump
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "Latest tag: $LATEST_TAG"
          
          VERSION=${LATEST_TAG#v}
          IFS='.' read -ra PARTS <<< "$VERSION"
          MAJOR=${PARTS[0]:-0}
          MINOR=${PARTS[1]:-0}
          PATCH=${PARTS[2]:-0}
          
          case "${{ needs.get-version-type.outputs.version_type }}" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac
          
          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT
          echo "🚀 New release tag: $NEW_TAG"
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.bump.outputs.new_tag }}
          name: Release ${{ steps.bump.outputs.new_tag }}
          body: |
            Release ${{ steps.bump.outputs.new_tag }}
            
            Created from PR #${{ needs.get-version-type.outputs.pr_number }}
            
            This release was automatically created when code was merged to main.
          draft: false
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ github.token }}

  detect-changes:
    name: Detect Changed Microsites
    runs-on: ubuntu-latest
    needs: create-release
    outputs:
      case: ${{ steps.changes.outputs.case }}
      customer: ${{ steps.changes.outputs.customer }}
      dashboard: ${{ steps.changes.outputs.dashboard }}
      user: ${{ steps.changes.outputs.user }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changes
        id: changes
        run: |
          PREV_SHA="${{ github.event.before }}"
          CURR_SHA="${{ github.sha }}"
          
          CASE_CHANGED=$(git diff --name-only $PREV_SHA $CURR_SHA | grep -q "^packages/case/" && echo "true" || echo "false")
          CUSTOMER_CHANGED=$(git diff --name-only $PREV_SHA $CURR_SHA | grep -q "^packages/customer/" && echo "true" || echo "false")
          DASHBOARD_CHANGED=$(git diff --name-only $PREV_SHA $CURR_SHA | grep -q "^packages/dashboard/" && echo "true" || echo "false")
          USER_CHANGED=$(git diff --name-only $PREV_SHA $CURR_SHA | grep -q "^packages/user/" && echo "true" || echo "false")
          
          echo "case=$CASE_CHANGED" >> $GITHUB_OUTPUT
          echo "customer=$CUSTOMER_CHANGED" >> $GITHUB_OUTPUT
          echo "dashboard=$DASHBOARD_CHANGED" >> $GITHUB_OUTPUT
          echo "user=$USER_CHANGED" >> $GITHUB_OUTPUT
          
          echo "📦 Changed microsites:"
          echo "  - case: $CASE_CHANGED"
          echo "  - customer: $CUSTOMER_CHANGED"
          echo "  - dashboard: $DASHBOARD_CHANGED"
          echo "  - user: $USER_CHANGED"

  # Deploy changed microsites to dev
  deploy-case-dev:
    name: Deploy Case to Dev
    needs: [create-release, detect-changes]
    if: needs.detect-changes.outputs.case == 'true'
    uses: ./.github/workflows/deploy.yaml
    with:
      microsite: case
      environment: development
      ref_to_build: ${{ needs.create-release.outputs.new_tag }}
    secrets: inherit

  deploy-customer-dev:
    name: Deploy Customer to Dev
    needs: [create-release, detect-changes]
    if: needs.detect-changes.outputs.customer == 'true'
    uses: ./.github/workflows/deploy.yaml
    with:
      microsite: customer
      environment: development
      ref_to_build: ${{ needs.create-release.outputs.new_tag }}
    secrets: inherit

  deploy-dashboard-dev:
    name: Deploy Dashboard to Dev
    needs: [create-release, detect-changes]
    if: needs.detect-changes.outputs.dashboard == 'true'
    uses: ./.github/workflows/deploy.yaml
    with:
      microsite: dashboard
      environment: development
      ref_to_build: ${{ needs.create-release.outputs.new_tag }}
    secrets: inherit

  deploy-user-dev:
    name: Deploy User to Dev
    needs: [create-release, detect-changes]
    if: needs.detect-changes.outputs.user == 'true'
    uses: ./.github/workflows/deploy.yaml
    with:
      microsite: user
      environment: development
      ref_to_build: ${{ needs.create-release.outputs.new_tag }}
    secrets: inherit

  update-manifest:
    name: Update Release Manifest
    needs: [create-release, detect-changes]
    runs-on: ubuntu-latest
    steps:
      - name: Install yq
        run: |
          curl -fsSLo /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          chmod +x /usr/local/bin/yq
          yq --version || (echo "yq download or execution failed" && exit 1)
      # PAT must have push access to joinworth/releases (Contents: Read and Write for that repo).
      - name: Checkout releases repo
        uses: actions/checkout@v4
        with:
          repository: joinworth/releases
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          path: releases
      - name: Update manifest
        run: |
          cd releases
          export SERVICE_NAME="${{ github.event.repository.name }}"
          export NEW_TAG="${{ needs.create-release.outputs.new_tag }}"

          if [ ! -f manifest.yaml ]; then
            echo "❌ manifest.yaml not found in releases repo"
            exit 1
          fi
          yq eval --inplace '.services[strenv(SERVICE_NAME)].dev = strenv(NEW_TAG)' manifest.yaml
          if ! yq eval '.services[strenv(SERVICE_NAME)].dev' manifest.yaml | grep -Fxq "$NEW_TAG"; then
            echo "❌ manifest update verification failed"
            exit 1
          fi

          git config user.email "github.pat@joinworth.com"
          git config user.name "patjoinworth"
          git add manifest.yaml
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update ${SERVICE_NAME} dev to ${NEW_TAG}"
            git push
          fi
